  <meta http-equiv="Cache-Control" content="public, max-age=2592000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>日本美食店铺投票清单</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, sans-serif;
      -webkit-tap-highlight-color: transparent;
      -webkit-overflow-scrolling: touch;
    }
    body {
      background: #f7f8fa;
      padding: 12px;
      max-width: 1200px;
      margin: 0 auto;
      overflow-x: hidden;
    }
    .header {
      text-align: center;
      margin-bottom: 16px;
    }
    .header h1 {
      color: #222;
      font-size: 20px;
      margin-bottom: 6px;
    }
    .header p {
      font-size: 13px;
      color: #666;
      margin-bottom: 8px;
    }
    .export-btn {
      font-size: 12px;
      padding: 4px 10px;
      background: #52c41a;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .filter-bar {
      background: #fff;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      position: sticky;
      top: 12px;
      z-index: 10;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.95);
    }
    select, button {
      padding: 6px 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 13px;
      background: #fff;
      flex: 1;
      min-width: 80px;
    }
    #resetBtn {
      background: #4096ff;
      color: white;
      border: none;
      flex: 0 0 auto;
    }
    .shop-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px;
    }
    .shop-card {
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 2px 10px #00000012;
      cursor: pointer;
      transition: transform 0.2s ease-out;
      position: relative;
      will-change: transform;
    }
    .shop-card:active {
      transform: scale(0.98);
    }
    .img-wrap {
      width: 100%;
      height: 180px;
      overflow-x: auto;
      overflow-y: hidden;
      display: flex;
      scroll-snap-type: x mandatory;
      pointer-events: none;
      scrollbar-width: none;
    }
    .img-wrap::-webkit-scrollbar {
      display: none;
    }
    .img-wrap img {
      height: 100%;
      width: auto;
      scroll-snap-align: start;
      flex-shrink: 0;
      object-fit: cover;
      background: #f0f0f0;
    }
    .info {
      padding: 14px;
      padding-right: 60px;
      position: relative;
      min-height: 120px;
    }
    .title {
      font-size: 15px;
      font-weight: 600;
      color: #111;
      margin-bottom: 6px;
      line-height: 1.4;
    }
    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin: 6px 0;
    }
    .tag {
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 20px;
      background: #e8f3ff;
      color: #2478d8;
    }
    .price-score {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 8px 0;
    }
    .price {
      color: #f54242;
      font-weight: 600;
      font-size: 14px;
    }
    .score {
      color: #333;
      font-size: 13px;
    }
    .remark {
      font-size: 12px;
      color: #555;
      line-height: 1.5;
      margin-top: 6px;
      padding-right: 10px;
    }
    .vote-btn {
      position: absolute;
      right: 14px;
      bottom: 14px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #ffecef;
      color: #ff7d97;
      border: none;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 2;
      will-change: transform;
    }
    .vote-btn.voted {
      background: #ff2d55;
      color: white;
    }
    .vote-btn:active {
      transform: scale(1.15);
    }

    /* 沉浸式全屏浏览 */
    .immersive-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
      z-index: 9999;
      display: none;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .immersive-modal.active {
      display: block;
      opacity: 1;
    }
    .shop-vertical-wrap {
      width: 100%;
      height: 100vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scrollbar-width: none;
    }
    .shop-vertical-wrap::-webkit-scrollbar {
      display: none;
    }
    .shop-full-item {
      width: 100%;
      height: 100vh;
      scroll-snap-align: start;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .img-horizontal-wrap {
      width: 100%;
      height: 100%;
      overflow-x: scroll;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
      display: flex;
    }
    .img-horizontal-wrap::-webkit-scrollbar {
      display: none;
    }
    .img-horizontal-wrap img {
      min-width: 100%;
      height: 100%;
      object-fit: contain;
      scroll-snap-align: center;
      flex-shrink: 0;
      background: #000;
    }
    .shop-full-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 60px;
      padding: 20px 20px 40px;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      color: #fff;
      z-index: 2;
      pointer-events: none;
    }
    .shop-full-info .shop-name {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .shop-full-info .shop-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 8px;
      font-size: 13px;
      opacity: 0.9;
    }
    .shop-full-info .shop-note {
      font-size: 13px;
      line-height: 1.6;
      opacity: 0.85;
    }
    .like-btn {
      position: absolute;
      right: 20px;
      bottom: 80px;
      z-index: 3;
      font-size: 44px;
      color: #fff;
      cursor: pointer;
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      user-select: none;
      will-change: transform;
    }
    .like-btn.liked {
      color: #ff2d55;
    }
    .like-btn:active {
      transform: scale(1.2);
    }
    .close-immersive {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
      color: #fff;
      font-size: 28px;
      cursor: pointer;
      background: rgba(0,0,0,0.3);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
    .img-indicator {
      position: absolute;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 2;
      pointer-events: none;
    }
    .img-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      transition: all 0.2s ease;
    }
    .img-dot.active {
      background: #fff;
      width: 18px;
      border-radius: 3px;
    }
    /* 双击爱心动画 */
    .heart-animation {
      position: absolute;
      font-size: 80px;
      color: #ff2d55;
      pointer-events: none;
      animation: heartPop 0.8s ease-out forwards;
      z-index: 5;
    }
    @keyframes heartPop {
      0% { transform: scale(0); opacity: 1; }
      50% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(1); opacity: 0; }
    }

    /* 复制成功提示 */
    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.8);
      color: #fff;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 10000;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
    }

    @media (max-width: 768px) {
      body { padding: 10px; }
      .filter-bar { padding: 10px; gap: 6px; top: 10px; }
      select { font-size: 12px; padding: 5px 8px; }
      .shop-list { grid-template-columns: 1fr; }
      .shop-full-info { right: 0; padding: 16px 16px 30px; }
      .like-btn { font-size: 36px; right: 16px; bottom: 70px; }
    }
  </style>
</head>

let filterData = [...shopList];
const immersiveModal = document.getElementById('immersiveModal');
const verticalWrap = document.getElementById('verticalWrap');
const closeImmersive = document.getElementById('closeImmersive');
const toast = document.getElementById('toast');
let currentImmersiveIndex = 0;
let scrollTimer = null;

// 读取本地存储投票
function loadVote() {
  const save = localStorage.getItem('shopVote');
  if(save) {
    const voteObj = JSON.parse(save);
    shopList.forEach(item=>{
      if(voteObj[item.id]) item.vote = voteObj[item.id];
    })
  }
}
// 保存投票
function saveVote() {
  const obj = {};
  shopList.forEach(i=>obj[i.id] = i.vote);
  localStorage.setItem('shopVote', JSON.stringify(obj));
}

// 显示提示
function showToast(text) {
  toast.textContent = text;
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'), 1500);
}

// 导出投票结果
function exportVote() {
  const voted = shopList.filter(s=>s.vote > 0).map(s=>`${s.shopName} - ${s.vote}票`);
  const text = voted.length > 0 
    ? `我的投票：\n${voted.join('\n')}`
    : '还没有投票哦';
  navigator.clipboard.writeText(text).then(()=>{
    showToast('投票结果已复制，直接粘贴分享');
  }).catch(()=>{
    prompt('复制以下内容分享：', text);
  });
}

// 渲染列表卡片
function renderList() {
  const container = document.getElementById('shopContainer');
  container.innerHTML = filterData.map((shop, index) => {
    let imgHtml = '';
    if(shop.images && shop.images.length>0) {
      shop.images.forEach((url, i)=>{
        imgHtml += `<img src="${url}" alt="" loading="lazy" decoding="async">`
      })
    }
    return `
      <div class="shop-card" onclick="openImmersive(${shop.id})">
        <div class="img-wrap">${imgHtml || '<div style="width:100%;height:100%;background:#eee;display:flex;align-items:center;justify-content:center;color:#999;font-size:12px">暂无实拍图</div>'}</div>
        <div class="info">
          <div class="title">${shop.shopName}</div>
          <div class="tag-row">
            <span class="tag">${shop.city} ${shop.region}</span>
            <span class="tag">${shop.foodType}</span>
          </div>
          <div class="price-score">
            <div class="price">人均 ¥${shop.priceRmb || '无'}</div>
            <div class="score">Google评分：${shop.score || '暂无'}</div>
          </div>
          <div class="remark">${shop.note || '暂无备注'}</div>
          <button class="vote-btn ${shop.vote>0?'voted':''}" onclick="event.stopPropagation(); voteShop(${shop.id})">❤️</button>
        </div>
      </div>
    `
  }).join('');
}

// 投票
window.voteShop = function(id) {
  const target = shopList.find(s=>s.id===id);
  if(target) {
    target.vote += 1;
    saveVote();
    renderList();
    updateImmersiveVote(id);
  }
}

// 打开沉浸式浏览
window.openImmersive = function(id) {
  const index = shopList.findIndex(s=>s.id===id);
  currentImmersiveIndex = index;
  renderImmersive();
  immersiveModal.classList.add('active');
  document.body.style.overflow = 'hidden';
  setTimeout(()=>{
    const items = document.querySelectorAll('.shop-full-item');
    if(items[index]) items[index].scrollIntoView({behavior: 'auto'});
  }, 10);
}

// 关闭沉浸式
closeImmersive.onclick = () => {
  immersiveModal.classList.remove('active');
  document.body.style.overflow = '';
}

// 渲染沉浸式所有店铺
function renderImmersive() {
  verticalWrap.innerHTML = shopList.map((shop, index) => {
    let imgHtml = '';
    let dotsHtml = '';
    shop.images.forEach((url, i)=>{
      imgHtml += `<img src="${url}" alt="" loading="lazy" decoding="async">`;
      dotsHtml += `<div class="img-dot ${i===0?'active':''}"></div>`;
    });
    return `
      <div class="shop-full-item" data-id="${shop.id}" data-index="${index}">
        <div class="img-horizontal-wrap" data-shop-id="${shop.id}">
          ${imgHtml}
        </div>
        <div class="img-indicator">${dotsHtml}</div>
        <div class="like-btn ${shop.vote>0?'liked':''}" onclick="event.stopPropagation(); voteShop(${shop.id})">❤️</div>
        <div class="shop-full-info">
          <div class="shop-name">${shop.shopName}</div>
          <div class="shop-meta">
            <span>${shop.city} ${shop.region}</span>
            <span>${shop.foodType}</span>
            <span>人均 ¥${shop.priceRmb || '无'}</span>
            <span>Google评分：${shop.score || '暂无'}</span>
          </div>
          <div class="shop-note">${shop.note || '暂无备注'}</div>
        </div>
      </div>
    `
  }).join('');

  // 双击投票
  document.querySelectorAll('.shop-full-item').forEach(item=>{
    let lastClick = 0;
    item.addEventListener('click', (e)=>{
      const now = Date.now();
      if(now - lastClick < 300) {
        const id = Number(item.dataset.id);
        voteShop(id);
        showHeartAnimation(e.clientX, e.clientY);
      }
      lastClick = now;
    });
  });

  // 横向滚动指示器 节流优化
  document.querySelectorAll('.img-horizontal-wrap').forEach(wrap=>{
    wrap.addEventListener('scroll', ()=>{
      if(scrollTimer) return;
      scrollTimer = setTimeout(()=>{
        const shopId = wrap.dataset.shopId;
        const scrollLeft = wrap.scrollLeft;
        const width = wrap.clientWidth;
        const current = Math.round(scrollLeft / width);
        const dots = wrap.parentElement.querySelectorAll('.img-dot');
        dots.forEach((dot, i)=>{
          dot.classList.toggle('active', i === current);
        });
        scrollTimer = null;
      }, 50);
    });
  });
}

// 更新沉浸式投票状态
function updateImmersiveVote(id) {
  if(!immersiveModal.classList.contains('active')) return;
  const item = document.querySelector(`.shop-full-item[data-id="${id}"]`);
  if(item) {
    const btn = item.querySelector('.like-btn');
    const shop = shopList.find(s=>s.id===id);
    btn.classList.toggle('liked', shop.vote > 0);
  }
}

// 双击爱心动画
function showHeartAnimation(x, y) {
  const heart = document.createElement('div');
  heart.className = 'heart-animation';
  heart.textContent = '❤️';
  heart.style.left = (x - 40) + 'px';
  heart.style.top = (y - 40) + 'px';
  immersiveModal.appendChild(heart);
  setTimeout(()=>heart.remove(), 800);
}

// 筛选排序
function filterSort() {
  const cityVal = document.getElementById('cityFilter').value;
  const typeVal = document.getElementById('typeFilter').value;
  const scoreVal = document.getElementById('scoreFilter').value;
  const sortVal = document.getElementById('sortFilter').value;

  filterData = [...shopList];
  if(cityVal) filterData = filterData.filter(s=>s.city === cityVal);
  if(typeVal) filterData = filterData.filter(s=>s.foodType.includes(typeVal));
  if(scoreVal) filterData = filterData.filter(s=>Number(s.score)>=Number(scoreVal));
  
  filterData.sort((a,b)=>{
    switch(sortVal) {
      case 'score-desc': return Number(b.score||0) - Number(a.score||0);
      case 'price-asc': return Number(a.priceRmb||9999) - Number(b.priceRmb||9999);
      case 'price-desc': return Number(b.priceRmb||0) - Number(a.priceRmb||0);
      case 'vote-desc': return b.vote - a.vote;
      default: return 0;
    }
  })
  renderList();
}

// 重置筛选
document.getElementById('resetBtn').onclick = ()=>{
  document.getElementById('cityFilter').value = '';
  document.getElementById('typeFilter').value = '';
  document.getElementById('scoreFilter').value = '';
  document.getElementById('sortFilter').value = 'score-desc';
  filterSort();
}
['cityFilter','typeFilter','scoreFilter','sortFilter'].forEach(id=>{
  document.getElementById(id).onchange = filterSort;
})

// 键盘快捷键
document.addEventListener('keydown', (e)=>{
  if(!immersiveModal.classList.contains('active')) return;
  const items = document.querySelectorAll('.shop-full-item');
  const current = Math.round(verticalWrap.scrollTop / window.innerHeight);
  if(e.key === 'ArrowDown') {
    if(current < items.length - 1) items[current+1].scrollIntoView({behavior: 'smooth'});
  } else if(e.key === 'ArrowUp') {
    if(current > 0) items[current-1].scrollIntoView({behavior: 'smooth'});
  } else if(e.key === 'Escape') {
    closeImmersive.click();
  } else if(e.key === ' ') {
    e.preventDefault();
    const id = Number(items[current].dataset.id);
    voteShop(id);
  }
});

// 预加载首屏图片
function preloadFirstScreen() {
  const firstImages = shopList.slice(0, 6).flatMap(s=>s.images.slice(0,1));
  firstImages.forEach(src=>{
    const img = new Image();
    img.src = src;
  });
}

// 初始化
loadVote();
filterSort();
window.addEventListener('load', preloadFirstScreen);
</script>
